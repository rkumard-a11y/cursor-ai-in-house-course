[pytest]
testpaths = tests
pythonpath = .
filterwarnings =
    ignore::DeprecationWarning

markers =
    auth: JWT and credential flows
    authz: role-based access control
    crud: resource create/read/update/delete
    validation: request body and query validation
    errors: HTTP error status and error payloads
    ratelimit: rate limit enforcement
    performance: response time budgets (local, in-process)
