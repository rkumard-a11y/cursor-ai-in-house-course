# SAST — CodeQL static analysis (separate jobs per language for path scoping).
# Alerts: Repository → Security → Code scanning.

name: CodeQL

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: "12 6 * * 1"

concurrency:
  group: codeql-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  javascript-typescript:
    name: CodeQL — JS/TS (src/)
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          build-mode: none
          config: |
            paths:
              - src
            paths-ignore:
              - "**/node_modules/**"
              - "dist/**"
              - "playwright-report/**"

      - uses: github/codeql-action/analyze@v3

  python:
    name: CodeQL — Python (backend/)
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - uses: github/codeql-action/init@v3
        with:
          languages: python
          build-mode: none
          config: |
            paths:
              - backend/app
              - backend/tests
            paths-ignore:
              - "**/.venv/**"
              - "**/__pycache__/**"

      - uses: github/codeql-action/analyze@v3
